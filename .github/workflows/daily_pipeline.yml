name: JobBot Daily Apply Pipeline

on:
  schedule:
    # 9:00 AM IST = 3:30 AM UTC — runs every day
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max jobs to apply (default 150)'
        required: false
        default: '150'
      platforms:
        description: 'Platforms: linkedin naukri indeed glassdoor'
        required: false
        default: 'linkedin naukri indeed glassdoor'

jobs:
  daily-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install Chrome ─────────────────────────────────────────
      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      # ── 4. Install Python packages ────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      # ── 5. Create required folders ────────────────────────────────
      - name: Create directories
        run: mkdir -p data/browser_profiles logs instance data

      # ── 6. Restore resume PDF ─────────────────────────────────────
      - name: Restore resume from secret
        run: echo "${{ secrets.RESUME_BASE64 }}" | base64 -d > data/resume.pdf

      # ── 7. Run daily pipeline ─────────────────────────────────────
      - name: Run JobBot daily pipeline
        env:
          DATABASE_URL:         ${{ secrets.DATABASE_URL }}
          FLASK_SECRET_KEY:     ${{ secrets.FLASK_SECRET_KEY }}
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          CANDIDATE_NAME:       "Sanagapalli Sri Ram Praneeth"
          CANDIDATE_EMAIL:      "praneethssr.2002@gmail.com"
          CANDIDATE_LINKEDIN:   "https://www.linkedin.com/in/sriampraneeth143/"
          RESUME_PDF_PATH:      "./data/resume.pdf"
          BROWSER_PROFILE_DIR:  "./data/browser_profiles"
          # Platform credentials (add these as GitHub Secrets)
          LINKEDIN_EMAIL:       "praneethssr.2002@gmail.com"
          LINKEDIN_PASSWORD:    ${{ secrets.LINKEDIN_PASSWORD }}
          NAUKRI_EMAIL:         "praneethssr.2002@gmail.com"
          NAUKRI_PASSWORD:      ${{ secrets.NAUKRI_PASSWORD }}
          INDEED_EMAIL:         "praneethssr.2002@gmail.com"
          INDEED_PASSWORD:      ${{ secrets.INDEED_PASSWORD }}
          GLASSDOOR_EMAIL:      "praneethssr.2002@gmail.com"
          GLASSDOOR_PASSWORD:   ${{ secrets.GLASSDOOR_PASSWORD }}
          # Settings
          HEADLESS:             "true"
          ATS_MIN_SCORE:        "75"
          MAX_EXPERIENCE_YEARS: "3"
          DAILY_APPLY_TARGET:   ${{ github.event.inputs.limit || '150' }}
        run: |
          python run_daily.py \
            --headless \
            --limit ${{ github.event.inputs.limit || 150 }} \
            --retry-errors \
            2>&1 | tee logs/daily_run.log

      # ── 8. Upload logs as artifact ────────────────────────────────
      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-run-${{ github.run_number }}-${{ github.run_attempt }}
          path: logs/
          retention-days: 30

      # ── 9. Notify on failure ──────────────────────────────────────
      - name: Report status
        if: always()
        run: |
          if [ -f logs/daily_run.log ]; then
            echo "=== LAST 50 LINES OF LOG ==="
            tail -50 logs/daily_run.log
          fi
