version: "3.9"

services:
  jobbot:
    build: .
    container_name: jobbot
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - HEADLESS=true
      - DATABASE_URL=sqlite:///data/jobbot.db
    depends_on:
      - selenium-hub

  selenium-hub:
    image: selenium/standalone-chrome:latest
    container_name: selenium_hub
    restart: unless-stopped
    ports:
      - "4444:4444"
      - "7900:7900"
    shm_size: "2gb"
    environment:
      - SE_NODE_MAX_SESSIONS=5
      - SE_SESSION_REQUEST_TIMEOUT=120

volumes:
  jobbot_data:
